<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อต. FIKA - ระบบแจ้งปัญหาเมือง</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
:root {
    --primary: #0a2540;      
    --primary-light: #184273;
    --accent: #f26522;       
    --accent-hover: #d95517;
    
    --bg-body: #f4f7f8;
    --bg-card: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --border-color: #e2e8f0;
    
    --status-open: #ef4444;       
    --status-progress: #f59e0b;   
    --status-done: #10b981;       
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Prompt", sans-serif; }

body {
    background: var(--bg-body); color: var(--text-main);
    min-height: 100vh; padding-bottom: 50px;
    background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 30px 30px; 
}

/* --- Corporate Header --- */
header {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #ffffff; padding: 60px 20px 80px; text-align: center;
    position: relative; clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%); 
    margin-bottom: -40px;
}
header h1 {
    font-size: 38px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 10px;
}
/* ทำให้โลโก้คลิกได้ */
header h1 i { color: var(--accent); font-size: 42px; cursor: pointer; transition: transform 0.2s; }
header h1 i:hover { transform: scale(1.1); }

header p { font-size: 16px; font-weight: 300; opacity: 0.9; max-width: 600px; margin: 0 auto; }

.container { max-width: 1200px; margin: auto; padding: 0 20px; position: relative; z-index: 10; }

/* --- Dashboard Stats --- */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat { background: var(--bg-card); border-radius: 12px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; border-left: 5px solid var(--primary); transition: transform 0.3s ease; }
.stat:hover { transform: translateY(-5px); }
.stat.s-total { border-color: var(--primary); }
.stat.s-open { border-color: var(--status-open); }
.stat.s-progress { border-color: var(--status-progress); }
.stat.s-done { border-color: var(--status-done); }

.stat-icon { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.s-total .stat-icon { background: rgba(10, 37, 64, 0.1); color: var(--primary); }
.s-open .stat-icon { background: rgba(239, 68, 68, 0.1); color: var(--status-open); }
.s-progress .stat-icon { background: rgba(245, 158, 11, 0.1); color: var(--status-progress); }
.s-done .stat-icon { background: rgba(16, 185, 129, 0.1); color: var(--status-done); }

.stat-info h2 { font-size: 28px; font-weight: 700; color: var(--text-main); line-height: 1; margin-bottom: 5px; }
.stat-info p { font-size: 14px; color: var(--text-muted); font-weight: 500; }

/* --- Main Layout --- */
.grid { display: grid; grid-template-columns: 380px 1fr; gap: 30px; align-items: start; }
.card { background: var(--bg-card); border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid var(--border-color); }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; border-bottom: 2px solid var(--bg-body); padding-bottom: 15px; }
.card-header h2 { font-size: 20px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px;}
.card-header h2 i { color: var(--accent); }

/* --- Form Elements --- */
.form-group { margin-bottom: 20px; }
label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-main); font-weight: 600; }
input, select, textarea { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc; color: var(--text-main); font-size: 15px; transition: all 0.2s ease; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: #ffffff; box-shadow: 0 0 0 4px rgba(242, 101, 34, 0.15); }

button.btn-submit { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 8px; background: var(--accent); color: white; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(242, 101, 34, 0.3); }
button.btn-submit:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(242, 101, 34, 0.4); }

/* --- Tickets List --- */
.ticket-list { display: flex; flex-direction: column; gap: 15px; }
.ticket { background: #ffffff; border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: all 0.3s ease; }
.ticket:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.08); border-color: #cbd5e1; transform: translateY(-3px); }

.ticket-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.ticket-title { font-size: 18px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.ticket-id { font-size: 12px; color: var(--text-muted); font-family: monospace; font-weight: 600; }

.ticket-desc { font-size: 15px; color: #334155; margin-bottom: 15px; line-height: 1.6; background: #f8fafc; padding: 10px; border-radius: 8px; border-left: 3px solid var(--border-color); }

.ticket-meta { display: flex; flex-wrap: wrap; gap: 15px; font-size: 13px; color: var(--text-muted); margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e1; }
.ticket-meta div { display: flex; align-items: center; gap: 6px; }
.ticket-meta i { font-size: 16px; color: var(--accent); }
.admin-phone { color: #d95517; font-weight: 600; background: rgba(242, 101, 34, 0.1); padding: 4px 10px; border-radius: 20px; border: 1px dashed #f26522;}

/* Status Badges */
.ticket-footer { display: flex; justify-content: space-between; align-items: center; }
.badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
.badge.open { background: #fee2e2; color: #b91c1c; }
.badge.progress { background: #fef3c7; color: #b45309; }
.badge.done { background: #d1fae5; color: #047857; }

.statusSelect { padding: 6px 10px; font-size: 13px; font-weight: 600; width: auto; background-color: var(--bg-body); border: 1px solid var(--border-color); border-radius: 6px; }

.empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
.empty-state i { font-size: 60px; color: #cbd5e1; margin-bottom: 10px; }

/* Toast Notification */
#toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 12px 24px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; transform: translateX(120%); transition: transform 0.3s; z-index: 1000; font-weight: 500; }
#toast.show { transform: translateX(0); }

@media(max-width: 900px) { .grid { grid-template-columns: 1fr; } header { padding: 40px 20px 60px; clip-path: polygon(0 0, 100% 0, 100% 90%, 0% 100%); } }
</style>
</head>

<body>

<header>
    <h1><i class="material-icons-round" onclick="secretAdminLogin()" title="คลิกที่นี่เพื่อเข้าสู่โหมดแอดมิน">location_city</i> อต. FIKA</h1>
    <p>ระบบแจ้งปัญหาเมืองอัจฉริยะ (Smart City Complaint System)</p>
</header>

<div class="container">
    <div class="stats">
        <div class="stat s-total"><div class="stat-icon"><i class="material-icons-round">analytics</i></div><div class="stat-info"><h2 id="total">0</h2><p>เรื่องทั้งหมด</p></div></div>
        <div class="stat s-open"><div class="stat-icon"><i class="material-icons-round">new_releases</i></div><div class="stat-info"><h2 id="open">0</h2><p>รอรับเรื่อง</p></div></div>
        <div class="stat s-progress"><div class="stat-icon"><i class="material-icons-round">engineering</i></div><div class="stat-info"><h2 id="progress">0</h2><p>กำลังดำเนินการ</p></div></div>
        <div class="stat s-done"><div class="stat-icon"><i class="material-icons-round">task_alt</i></div><div class="stat-info"><h2 id="done">0</h2><p>เสร็จสิ้น</p></div></div>
    </div>

    <div class="grid">
        <div class="card" style="position: sticky; top: 20px;">
            <div class="card-header">
                <h2><i class="material-icons-round">campaign</i> แจ้งปัญหาใหม่</h2>
            </div>
            <form id="form">
                <div class="form-group">
                    <label>ชื่อผู้แจ้ง</label>
                    <input id="reporter" placeholder="ชื่อ หรือ นามแฝง" required>
                </div>
                <div class="form-group">
                    <label>เบอร์โทรศัพท์ (ไม่บังคับ)</label>
                    <input type="tel" id="phone" placeholder="สำหรับเจ้าหน้าที่ติดต่อกลับ (ข้อมูลจะถูกปกปิด)">
                </div>
                <div class="form-group">
                    <label>สถานที่เกิดเหตุ</label>
                    <input id="loc" placeholder="เช่น ถนนตลาดเหนือ, ซอย 5" required>
                </div>
                <div class="form-group">
                    <label>ประเภทของปัญหา</label>
                    <select id="category">
                        <option value="ถนนชำรุด">🛣️ ถนนชำรุด / หลุมบ่อ</option>
                        <option value="ไฟถนนดับ">💡 ไฟถนนดับ</option>
                        <option value="ขยะ">🗑️ ปัญหาขยะตกค้าง</option>
                        <option value="ท่อระบายน้ำ">🌊 ท่อระบายน้ำ / น้ำท่วมขัง</option>
                        <option value="น้ำประปา">🚰 น้ำประปา / ท่อแตก</option>
                        <option value="ต้นไม้กีดขวาง">🌳 ต้นไม้กีดขวาง</option>
                        <option value="สัตว์จรจัด">🐕 สัตว์จรจัด</option>
                        <option value="อื่นๆ">❓ อื่นๆ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>รายละเอียดปัญหา</label>
                    <textarea id="problem" rows="4" placeholder="อธิบายรายละเอียดปัญหาที่พบเห็น..." required></textarea>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="material-icons-round">send</i> ส่งแจ้งปัญหา
                </button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="material-icons-round">format_list_bulleted</i> รายการแจ้งปัญหา</h2>
            </div>
            <div id="list" class="ticket-list"></div>
        </div>
    </div>
</div>

<div id="toast"><i class="material-icons-round">check_circle</i> <span>บันทึกข้อมูลสำเร็จ!</span></div>

<script>
let tickets = JSON.parse(localStorage.getItem("fika_city_tickets_v2")) || [];
let nextId = tickets.length ? Math.max(...tickets.map(t => t.id)) + 1 : 1;
const list = document.getElementById("list");
const toast = document.getElementById("toast");

// ตัวแปรเช็คว่าเป็นโหมดแอดมินหรือยัง (เริ่มต้นคือไม่ใช่)
let isAdmin = false;

const statusLabels = {
    open: "รอรับเรื่อง",
    progress: "กำลังดำเนินการ",
    done: "เสร็จสิ้น"
};

function showToast(message) {
    toast.querySelector('span').textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// ฟังก์ชันลับสำหรับเข้าสู่โหมดแอดมิน (เมื่อคลิกที่โลโก้ตึก)
function secretAdminLogin() {
    if (isAdmin) {
        // ถ้าเป็นแอดมินอยู่แล้ว คลิกอีกทีคือออกจากระบบ
        isAdmin = false;
        showToast("ออกจากโหมดเจ้าหน้าที่แล้ว (ซ่อนเบอร์โทร)");
        render(); // รีโหลดการ์ดใหม่ให้เบอร์หายไป
        return;
    }
    
    // เด้งหน้าต่างให้ใส่รหัส
    let password = prompt("พื้นที่สำหรับเจ้าหน้าที่\nกรุณาใส่รหัสผ่าน (ลองพิมพ์: admin):");
    
    // เช็ครหัสผ่าน (เปลี่ยนคำว่า admin เป็นรหัสที่คุณต้องการได้เลย)
    if (password === "admin") {
        isAdmin = true;
        showToast("เข้าสู่โหมดเจ้าหน้าที่สำเร็จ (แสดงเบอร์โทร)");
        render(); // รีโหลดการ์ดใหม่ให้โชว์เบอร์
    } else if (password !== null) {
        alert("รหัสผ่านไม่ถูกต้อง!");
    }
}

function updateStats() {
    document.getElementById("total").textContent = tickets.length;
    document.getElementById("open").textContent = tickets.filter(t => t.status === "open").length;
    document.getElementById("progress").textContent = tickets.filter(t => t.status === "progress").length;
    document.getElementById("done").textContent = tickets.filter(t => t.status === "done").length;
}

function render() {
    list.innerHTML = "";

    if(tickets.length === 0) {
        list.innerHTML = `<div class="empty-state"><i class="material-icons-round">inbox</i><p>ยังไม่มีรายการแจ้งปัญหาในขณะนี้</p></div>`;
        updateStats();
        return;
    }

    tickets.forEach((t) => {
        let dateStr = "ไม่ระบุเวลา";
        if (t.date) {
            let d = new Date(t.date);
            dateStr = d.toLocaleDateString('th-TH', { month: 'short', day: 'numeric'}) + ' ' + d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
        }

        // --- ส่วนตรวจสอบเบอร์โทร ---
        // ถ้าอยู่ในโหมด isAdmin และมีการกรอกเบอร์โทรไว้ ถึงจะสร้าง HTML ส่วนนี้
        let phoneHtml = "";
        if (isAdmin && t.phone && t.phone.trim() !== "") {
            phoneHtml = `<div class="admin-phone"><i class="material-icons-round">phone_in_talk</i> ${t.phone}</div>`;
        }

        // --- ส่วนตรวจสอบ dropdown สถานะ ---
        // ถ้าไม่ใช่ Admin จะเปลี่ยนสถานะไม่ได้ (ให้เป็นข้อความเฉยๆ) แต่ถ้าเป็น Admin ถึงจะโชว์กล่องให้เลือกเปลี่ยน
        let statusControlHtml = "";
        if (isAdmin) {
            statusControlHtml = `
                <select class="statusSelect" onchange="updateStatus(${t.id}, this.value)">
                    <option value="open" ${t.status === "open" ? "selected" : ""}>รอรับเรื่อง</option>
                    <option value="progress" ${t.status === "progress" ? "selected" : ""}>กำลังดำเนินการ</option>
                    <option value="done" ${t.status === "done" ? "selected" : ""}>เสร็จสิ้น</option>
                </select>
            `;
        }

        list.innerHTML += `
            <div class="ticket">
                <div class="ticket-top">
                    <div>
                        <div class="ticket-id">#FIKA-${String(t.id).padStart(4, '0')}</div>
                        <div class="ticket-title">${t.category}</div>
                    </div>
                    <span class="badge ${t.status}">
                        ${statusLabels[t.status]}
                    </span>
                </div>
                
                <div class="ticket-desc">${t.problem}</div>
                
                <div class="ticket-meta">
                    <div><i class="material-icons-round">place</i> ${t.location}</div>
                    <div><i class="material-icons-round">person</i> ${t.reporter}</div>
                    <div><i class="material-icons-round">schedule</i> ${dateStr}</div>
                    ${phoneHtml} </div>
                
                <div class="ticket-footer">
                    <span style="font-size: 13px; font-weight: 600; color: var(--text-muted);">
                        ${isAdmin ? "อัปเดตสถานะ:" : "สถานะปัจจุบัน:"}
                    </span>
                    ${statusControlHtml}
                </div>
            </div>
        `;
    });

    updateStats();
}

function updateStatus(id, status) {
    let t = tickets.find(x => x.id === id);
    if(t) {
        t.status = status;
        localStorage.setItem("fika_city_tickets_v2", JSON.stringify(tickets));
        render();
        showToast("อัปเดตสถานะเรียบร้อยแล้ว");
    }
}

document.getElementById("form").onsubmit = e => {
    e.preventDefault();
    
    let btn = document.getElementById("submitBtn");
    let originalHtml = btn.innerHTML;
    btn.innerHTML = `<i class="material-icons-round">sync</i> กำลังส่งข้อมูล...`;
    btn.disabled = true;

    setTimeout(() => {
        let ticket = {
            id: nextId++,
            reporter: document.getElementById("reporter").value,
            phone: document.getElementById("phone").value, // เซฟเบอร์โทรเก็บไว้
            location: document.getElementById("loc").value,
            category: document.getElementById("category").value,
            problem: document.getElementById("problem").value,
            status: "open",
            date: Date.now()
        };

        tickets.unshift(ticket);
        localStorage.setItem("fika_city_tickets_v2", JSON.stringify(tickets));
        
        render();
        e.target.reset();
        showToast("ส่งเรื่องแจ้งปัญหาเรียบร้อยแล้ว");
        
        btn.innerHTML = originalHtml;
        btn.disabled = false;
    }, 400); 
};

render();
</script>

</body>
</html>
