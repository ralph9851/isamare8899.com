<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อต. FIKA - ระบบแจ้งปัญหาเมือง</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
:root {
    /* โทนสีใหม่ สดใส ฉูดฉาด และมีมิติ */
    --primary: #1e1b4b;      
    --primary-light: #312e81;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --bg-body: #f3f4f6;
    --bg-card: #ffffff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
    
    --shadow-card: 0 10px 30px -5px rgba(0, 0, 0, 0.08);
    --shadow-glow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Prompt", sans-serif; }
body { 
    background: var(--bg-body); 
    background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
    color: var(--text-main); min-height: 100vh; padding-bottom: 80px; line-height: 1.6; 
}

/* --- Header Banner สุดล้ำ --- */
header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
    color: #ffffff; 
    padding: 40px 20px 100px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
header::before {
    content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
    animation: rotate 20s linear infinite;
}
@keyframes rotate { 100% { transform: rotate(360deg); } }

.header-top { 
    display: flex; justify-content: space-between; align-items: center; 
    max-width: 1000px; margin: 0 auto; position: relative; z-index: 2;
}
.logo-area h1 { 
    font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 12px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}
.logo-icon-bg {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    padding: 10px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
}
.logo-area h1 i { color: #fff; font-size: 32px; }
.logo-area p { font-size: 15px; color: #cbd5e1; margin-top: 5px; opacity: 0.9; }

/* ปุ่มเข้าระบบ */
.auth-btn {
    background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.3s;
}
.auth-btn:hover { background: #fff; color: var(--primary); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
.auth-btn.logout { background: #ef4444; border-color: #ef4444; color: white;}
.auth-btn.logout:hover { background: #dc2626; color: white; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);}

.container { max-width: 1000px; margin: -60px auto 40px; padding: 0 20px; position: relative; z-index: 10; }

/* --- Stats (บัตรสถิติสีสันจัดจ้าน) --- */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
.stat { 
    background: var(--bg-card); border-radius: 20px; padding: 25px; 
    box-shadow: var(--shadow-card); display: flex; align-items: center; gap: 18px; 
    transition: 0.3s; border-bottom: 4px solid transparent;
}
.stat:hover { transform: translateY(-5px); box-shadow: 0 15px 35px -5px rgba(0,0,0,0.1); }
.stat-icon { 
    width: 55px; height: 55px; border-radius: 16px; display: flex; align-items: center; justify-content: center; 
    font-size: 28px; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
/* ไล่สีให้แต่ละกล่องสถิติ */
.stat:nth-child(1) { border-bottom-color: #6366f1; }
.stat:nth-child(1) .stat-icon { background: linear-gradient(135deg, #6366f1, #4f46e5); }
.stat:nth-child(2) { border-bottom-color: #f43f5e; }
.stat:nth-child(2) .stat-icon { background: linear-gradient(135deg, #f43f5e, #e11d48); }
.stat:nth-child(3) { border-bottom-color: #f59e0b; }
.stat:nth-child(3) .stat-icon { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
.stat:nth-child(4) { border-bottom-color: #10b981; }
.stat:nth-child(4) .stat-icon { background: linear-gradient(135deg, #34d399, #10b981); }

.stat-info h2 { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; color: var(--text-main); }
.stat-info p { font-size: 14px; color: var(--text-muted); font-weight: 600; }

/* --- Card หลัก --- */
.card { 
    background: var(--bg-card); border-radius: 24px; padding: 40px; 
    box-shadow: var(--shadow-card); margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.8);
}
.card-header { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px dashed #e5e7eb; display: flex; justify-content: space-between; align-items: center;}
.card-header h2 { font-size: 22px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 12px;}
.card-header h2 i { background: #f3f4f6; color: var(--accent-blue); padding: 10px; border-radius: 12px; }

/* --- ฟอร์มกรอกที่น่าใช้ขึ้น --- */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media(max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
.form-group { margin-bottom: 5px; }
.form-group.full { grid-column: 1 / -1; }
label { display: block; margin-bottom: 8px; font-size: 15px; color: #374151; font-weight: 600; }
.form-control { 
    width: 100%; padding: 16px; border-radius: 14px; 
    border: 2px solid #e5e7eb; background: #f9fafb; 
    font-size: 15px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: var(--text-main);
}
.form-control:focus { 
    outline: none; border-color: var(--accent-blue); background: #ffffff; 
    box-shadow: 0 0 0 5px rgba(59, 130, 246, 0.15); transform: translateY(-2px);
}
.form-control::placeholder { color: #9ca3af; }

.btn-submit { 
    padding: 16px 32px; border: none; border-radius: 14px; 
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); 
    color: white; font-size: 16px; font-weight: 600; letter-spacing: 0.5px;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 10px; 
    transition: all 0.3s; box-shadow: var(--shadow-glow); width: 100%; margin-top: 15px;
}
.btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -5px rgba(139, 92, 246, 0.5); }
.btn-submit i { font-size: 20px; }

/* --- Timeline ที่ดูโดดเด่น --- */
.timeline-container { position: relative; padding-left: 30px; margin-top: 10px; }
.timeline-container::before {
    content: ''; position: absolute; top: 10px; left: 6px; height: calc(100% - 20px); width: 4px; 
    background: linear-gradient(to bottom, #cbd5e1, #f1f5f9); border-radius: 10px;
}
.timeline-item { position: relative; margin-bottom: 35px; }
.timeline-icon {
    position: absolute; top: 15px; left: -32.5px; width: 18px; height: 18px; 
    border-radius: 50%; border: 4px solid #ffffff; box-shadow: 0 0 0 3px #cbd5e1, 0 4px 10px rgba(0,0,0,0.1); 
    z-index: 2; transition: 0.3s;
}
.timeline-icon.open { background: #ef4444; box-shadow: 0 0 0 3px #fca5a5, 0 4px 10px rgba(239, 68, 68, 0.4); }
.timeline-icon.progress { background: #f59e0b; box-shadow: 0 0 0 3px #fcd34d, 0 4px 10px rgba(245, 158, 11, 0.4); }
.timeline-icon.done { background: #10b981; box-shadow: 0 0 0 3px #6ee7b7, 0 4px 10px rgba(16, 185, 129, 0.4); }

.ticket-box {
    background: #ffffff; border: 1px solid #e5e7eb; border-radius: 20px; 
    padding: 24px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    position: relative; overflow: hidden;
}
.ticket-box::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
.ticket-box.open::before { background: #ef4444; }
.ticket-box.progress::before { background: #f59e0b; }
.ticket-box.done::before { background: #10b981; }

.ticket-box:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.08); transform: translateY(-3px); border-color: #d1d5db; }

.ticket-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.ticket-id { font-size: 13px; color: var(--accent-blue); font-weight: 700; margin-bottom: 4px; display: inline-block; background: #eff6ff; padding: 4px 10px; border-radius: 8px;}
.ticket-title { font-size: 18px; font-weight: 700; color: var(--text-main); margin-top: 5px;}
.ticket-desc { font-size: 15px; color: #4b5563; margin-bottom: 20px; background: #f9fafb; padding: 16px; border-radius: 12px; line-height: 1.6;}

.ticket-meta { 
    display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; 
    margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #e5e7eb; 
}
.ticket-meta div { display: flex; align-items: center; gap: 6px; background: #f3f4f6; padding: 6px 12px; border-radius: 8px; font-weight: 500;}
.ticket-meta i { font-size: 16px; color: var(--accent-purple); }

/* Badges */
.badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px;}
.badge::before { content: ''; width: 8px; height: 8px; border-radius: 50%; }
.badge.open { background: #fee2e2; color: #b91c1c; } .badge.open::before { background: #ef4444; }
.badge.progress { background: #fef3c7; color: #b45309; } .badge.progress::before { background: #f59e0b; }
.badge.done { background: #d1fae5; color: #047857; } .badge.done::before { background: #10b981; }

/* Admin Tools */
.admin-controls { display: flex; gap: 10px; align-items: center; background: #f8fafc; padding: 12px; border-radius: 12px;}
.admin-controls select { padding: 8px 12px; font-size: 14px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 600; color: var(--text-main); cursor: pointer;}
.btn-delete { background: white; color: #ef4444; border: 1px solid #fca5a5; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: 0.2s;}
.btn-delete:hover { background: #ef4444; color: white; }

/* --- Modal & Toast --- */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(5px);
    display: flex; justify-content: center; align-items: center; z-index: 999
