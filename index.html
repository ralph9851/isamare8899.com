<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อต. FIKA - ระบบแจ้งปัญหาเมือง</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
:root {
    --primary: #0a2540;      
    --primary-light: #184273;
    --accent: #f26522;       
    --accent-hover: #d95517;
    
    --bg-body: #f4f7f8;
    --bg-card: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --border-color: #e2e8f0;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Prompt", sans-serif; }
body { background: var(--bg-body); color: var(--text-main); min-height: 100vh; padding-bottom: 50px; }

/* --- Header & Nav --- */
header {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #ffffff; padding: 40px 20px 80px;
    position: relative; clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%); 
    margin-bottom: -40px;
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; max-width: 1200px; margin: 0 auto 20px; }
.logo-area { text-align: left; }
.logo-area h1 { font-size: 32px; font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
.logo-area h1 i { color: var(--accent); font-size: 36px; }
.logo-area p { font-size: 15px; font-weight: 300; opacity: 0.9; }

/* ปุ่ม Login / Logout */
.auth-btn {
    background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
}
.auth-btn:hover { background: var(--accent); border-color: var(--accent); }
.auth-btn.logout { background: #ef4444; border-color: #ef4444; }

.container { max-width: 1200px; margin: auto; padding: 0 20px; position: relative; z-index: 10; }

/* --- Stats & Cards --- */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat { background: var(--bg-card); border-radius: 12px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 20px; border-left: 5px solid var(--primary); }
.stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(10, 37, 64, 0.1); color: var(--primary); }
.stat-info h2 { font-size: 24px; font-weight: 700; color: var(--text-main); margin-bottom: 2px; }
.stat-info p { font-size: 13px; color: var(--text-muted); font-weight: 500; }

.grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }
.card { background: var(--bg-card); border-radius: 16px; padding: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid var(--border-color); }
.card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--bg-body); padding-bottom: 15px; }
.card-header h2 { font-size: 18px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px;}

/* --- Forms --- */
.form-group { margin-bottom: 15px; }
label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--text-main); font-weight: 600; }
input, select, textarea { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc; font-size: 14px; transition: 0.2s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: #ffffff; box-shadow: 0 0 0 3px rgba(242, 101, 34, 0.1); }
.btn-submit { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: var(--accent); color: white; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

/* --- Tickets --- */
.ticket-list { display: flex; flex-direction: column; gap: 15px; }
.ticket { background: #ffffff; border-radius: 12px; padding: 20px; border: 1px solid var(--border-color); }
.ticket-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.ticket-title { font-size: 16px; font-weight: 700; color: var(--primary); }
.ticket-desc { font-size: 14px; color: #334155; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 8px; }
.ticket-meta { display: flex; flex-wrap: wrap; gap: 15px; font-size: 12px; color: var(--text-muted); margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #cbd5e1; }
.ticket-meta div { display: flex; align-items: center; gap: 4px; }
.ticket-meta i { font-size: 14px; color: var(--accent); }
.admin-phone { color: #d95517; font-weight: 600; background: rgba(242, 101, 34, 0.1); padding: 2px 8px; border-radius: 6px;}

.ticket-footer { display: flex; justify-content: space-between; align-items: center; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge.open { background: #fee2e2; color: #b91c1c; }
.badge.progress { background: #fef3c7; color: #b45309; }
.badge.done { background: #d1fae5; color: #047857; }

/* --- Admin Elements --- */
.admin-controls { display: flex; gap: 10px; align-items: center; }
.btn-delete { background: #fee2e2; color: #b91c1c; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px;}
.btn-delete:hover { background: #ef4444; color: white; }

/* --- Login Modal --- */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 37, 64, 0.8);
    display: flex; justify-content: center; align-items: center; z-index: 9999;
    opacity: 0; pointer-events: none; transition: 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: all; }
.modal-box {
    background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateY(-20px); transition: 0.3s; text-align: center;
}
.modal-overlay.active .modal-box { transform: translateY(0); }
.modal-box h2 { color: var(--primary); margin-bottom: 20px; font-size: 22px; }
.modal-close { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #94a3b8; }

#toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 12px 24px; border-radius: 8px; display: flex; align-items: center; gap: 10px; transform: translateX(120%); transition: 0.3s; z-index: 1000; }
#toast.show { transform: translateX(0); }
</style>
</head>

<body>

<header>
    <div class="header-top">
        <div class="logo-area">
            <h1><i class="material-icons-round">location_city</i> อต. FIKA</h1>
            <p>ระบบแจ้งปัญหาเมืองอัจฉริยะ</p>
        </div>
        <div id="authContainer">
            <button class="auth-btn" onclick="openModal()"><i class="material-icons-round">admin_panel_settings</i> สำหรับเจ้าหน้าที่</button>
        </div>
    </div>
</header>

<div class="container">
    <div class="stats">
        <div class="stat"><div class="stat-icon"><i class="material-icons-round">analytics</i></div><div class="stat-info"><h2 id="total">0</h2><p>เรื่องทั้งหมด</p></div></div>
        <div class="stat"><div class="stat-icon"><i class="material-icons-round">new_releases</i></div><div class="stat-info"><h2 id="open">0</h2><p>รอรับเรื่อง</p></div></div>
        <div class="stat"><div class="stat-icon"><i class="material-icons-round">engineering</i></div><div class="stat-info"><h2 id="progress">0</h2><p>กำลังดำเนินการ</p></div></div>
        <div class="stat"><div class="stat-icon"><i class="material-icons-round">task_alt</i></div><div class="stat-info"><h2 id="done">0</h2><p>เสร็จสิ้น</p></div></div>
    </div>

    <div class="grid">
        <div class="card" style="position: sticky; top: 20px;">
            <div class="card-header"><h2><i class="material-icons-round">campaign</i> แจ้งปัญหาใหม่</h2></div>
            <form id="form">
                <div class="form-group"><label>ชื่อผู้แจ้ง</label><input id="reporter" required></div>
                <div class="form-group"><label>เบอร์โทรศัพท์ (ไม่บังคับ)</label><input type="tel" id="phone" placeholder="ซ่อนจากบุคคลทั่วไป"></div>
                <div class="form-group"><label>สถานที่เกิดเหตุ</label><input id="loc" required></div>
                <div class="form-group">
                    <label>ประเภทปัญหา</label>
                    <select id="category">
                        <option>ถนนชำรุด / หลุมบ่อ</option><option>ไฟถนนดับ</option><option>ปัญหาขยะตกค้าง</option><option>ท่อระบายน้ำ</option>
                    </select>
                </div>
                <div class="form-group"><label>รายละเอียด</label><textarea id="problem" rows="3" required></textarea></div>
                <button type="submit" class="btn-submit">ส่งแจ้งปัญหา</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header"><h2><i class="material-icons-round">format_list_bulleted</i> รายการแจ้งปัญหา</h2></div>
            <div id="list" class="ticket-list"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="loginModal">
    <div class="modal-box">
        <i class="material-icons-round modal-close" onclick="closeModal()">close</i>
        <h2>เข้าสู่ระบบเจ้าหน้าที่</h2>
        <div class="form-group" style="text-align: left;">
            <label>Username</label>
            <input type="text" id="loginUser" placeholder="ลองพิมพ์: admin">
        </div>
        <div class="form-group" style="text-align: left;">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="ลองพิมพ์: 1234">
        </div>
        <button class="btn-submit" onclick="checkLogin()" style="margin-top: 20px;">เข้าสู่ระบบ</button>
    </div>
</div>

<div id="toast"><i class="material-icons-round">info</i> <span>...</span></div>

<script>
let tickets = JSON.parse(localStorage.getItem("fika_city_tickets_v3")) || [];
let nextId = tickets.length ? Math.max(...tickets.map(t => t.id)) + 1 : 1;

// ตัวแปรเช็คสถานะแอดมิน
let isAdmin = false;

// 🔑 ตั้งรหัสผ่านตรงนี้เลยครับ! (Hardcoded Credentials)
const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

function showToast(msg) {
    document.querySelector('#toast span').textContent = msg;
    document.getElementById('toast').classList.add('show');
    setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
}

// ควบคุมหน้าต่าง Login
function openModal() { document.getElementById('loginModal').classList.add('active'); }
function closeModal() { document.getElementById('loginModal').classList.remove('active'); document.getElementById('loginUser').value = ''; document.getElementById('loginPass').value = ''; }

// ฟังก์ชันเช็ครหัสผ่าน
function checkLogin() {
    let u = document.getElementById('loginUser').value;
    let p = document.getElementById('loginPass').value;

    if(u === ADMIN_USER && p === ADMIN_PASS) {
        isAdmin = true;
        closeModal();
        updateAuthButton();
        render();
        showToast("เข้าสู่ระบบเจ้าหน้าที่สำเร็จ");
    } else {
        alert("Username หรือ Password ไม่ถูกต้อง!");
    }
}

// ฟังก์ชันออกจากระบบ
function logout() {
    isAdmin = false;
    updateAuthButton();
    render();
    showToast("ออกจากระบบแล้ว");
}

// อัปเดตปุ่มมุมขวาบน
function updateAuthButton() {
    let container = document.getElementById('authContainer');
    if(isAdmin) {
        container.innerHTML = `<button class="auth-btn logout" onclick="logout()"><i class="material-icons-round">logout</i> ออกจากระบบ</button>`;
    } else {
        container.innerHTML = `<button class="auth-btn" onclick="openModal()"><i class="material-icons-round">admin_panel_settings</i> สำหรับเจ้าหน้าที่</button>`;
    }
}

function updateStats() {
    document.getElementById("total").textContent = tickets.length;
    document.getElementById("open").textContent = tickets.filter(t => t.status === "open").length;
    document.getElementById("progress").textContent = tickets.filter(t => t.status === "progress").length;
    document.getElementById("done").textContent = tickets.filter(t => t.status === "done").length;
}

// ฟังก์ชันลบปัญหา (เฉพาะแอดมิน)
function deleteTicket(id) {
    if(confirm("คุณต้องการลบรายการนี้ใช่หรือไม่?")) {
        tickets = tickets.filter(t => t.id !== id);
        localStorage.setItem("fika_city_tickets_v3", JSON.stringify(tickets));
        render();
        showToast("ลบข้อมูลเรียบร้อยแล้ว");
    }
}

function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";
    if(tickets.length === 0) { list.innerHTML = `<div style="text-align:center; padding: 40px; color:#94a3b8;">ไม่มีรายการแจ้งปัญหา</div>`; updateStats(); return; }

    const statusLabels = { open: "รอรับเรื่อง", progress: "กำลังดำเนินการ", done: "เสร็จสิ้น" };

    tickets.forEach((t) => {
        let phoneHtml = (isAdmin && t.phone) ? `<div class="admin-phone"><i class="material-icons-round">phone</i> ${t.phone}</div>` : "";
        
        // ถ้าเป็นแอดมิน ให้โชว์ Dropdown กับปุ่มลบ
        let adminControls = "";
        if (isAdmin) {
            adminControls = `
                <div class="admin-controls">
                    <select style="padding: 4px; font-size: 12px; border-radius: 4px; border: 1px solid #cbd5e1;" onchange="updateStatus(${t.id}, this.value)">
                        <option value="open" ${t.status === "open" ? "selected" : ""}>รอรับเรื่อง</option>
                        <option value="progress" ${t.status === "progress" ? "selected" : ""}>กำลังดำเนินการ</option>
                        <option value="done" ${t.status === "done" ? "selected" : ""}>เสร็จสิ้น</option>
                    </select>
                    <button class="btn-delete" onclick="deleteTicket(${t.id})"><i class="material-icons-round" style="font-size:14px;">delete</i> ลบ</button>
                </div>
            `;
        }

        list.innerHTML += `
            <div class="ticket">
                <div class="ticket-top">
                    <div><span style="font-size:12px; color:#64748b;">#FIKA-${t.id}</span><div class="ticket-title">${t.category}</div></div>
                    <span class="badge ${t.status}">${statusLabels[t.status]}</span>
                </div>
                <div class="ticket-desc">${t.problem}</div>
                <div class="ticket-meta">
                    <div><i class="material-icons-round">place</i> ${t.location}</div>
                    <div><i class="material-icons-round">person</i> ${t.reporter}</div>
                    ${phoneHtml}
                </div>
                <div class="ticket-footer">
                    <span style="font-size: 12px; color: #64748b;">${isAdmin ? "จัดการสถานะ:" : "สถานะปัจจุบัน"}</span>
                    ${adminControls}
                </div>
            </div>
        `;
    });
    updateStats();
}

function updateStatus(id, status) {
    let t = tickets.find(x => x.id === id);
    if(t) { t.status = status; localStorage.setItem("fika_city_tickets_v3", JSON.stringify(tickets)); render(); showToast("อัปเดตสถานะแล้ว"); }
}

document.getElementById("form").onsubmit = e => {
    e.preventDefault();
    let ticket = {
        id: nextId++,
        reporter: document.getElementById("reporter").value,
        phone: document.getElementById("phone").value,
        location: document.getElementById("loc").value,
        category: document.getElementById("category").value,
        problem: document.getElementById("problem").value,
        status: "open"
    };
    tickets.unshift(ticket);
    localStorage.setItem("fika_city_tickets_v3", JSON.stringify(tickets));
    render();
    e.target.reset();
    showToast("ส่งเรื่องเรียบร้อยแล้ว");
};

render();
</script>

</body>
</html>
