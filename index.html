<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อต. FIKA - ระบบแจ้งปัญหาเมือง</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
:root {
    --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
    --card-bg: rgba(255, 255, 255, 0.03);
    --card-border: rgba(255, 255, 255, 0.08);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --accent: #10b981;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Prompt", sans-serif;
}

body {
    background: var(--bg-gradient);
    color: var(--text-main);
    min-height: 100vh;
    padding-bottom: 40px;
}

/* --- Header --- */
header {
    text-align: center;
    padding: 50px 20px 40px;
}
header h1 {
    font-size: 42px;
    font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: 1px;
}
header p {
    color: var(--text-muted);
    font-size: 16px;
    font-weight: 300;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 0 20px;
}

/* --- Dashboard Stats --- */
.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}
.stat {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.stat:hover {
    transform: translateY(-5px);
    background: rgba(255, 255, 255, 0.06);
}
.stat i {
    font-size: 28px;
    margin-bottom: 10px;
    opacity: 0.8;
}
.stat h2 {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #fff;
}
.stat p {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
}

/* --- Main Layout --- */
.grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 30px;
    align-items: start;
}

.card {
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.card h2 {
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    border-bottom: 1px solid var(--card-border);
    padding-bottom: 15px;
}
.card h2 i {
    color: var(--primary);
}

/* --- Form Elements --- */
.form-group {
    margin-bottom: 18px;
}
label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    color: #cbd5e1;
    font-weight: 500;
}
input, select, textarea {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.25);
    color: white;
    font-size: 15px;
    transition: all 0.3s ease;
}
input::placeholder, textarea::placeholder {
    color: #64748b;
}
input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
}
select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 1rem center;
    background-size: 1em;
}
select option { background: #1e293b; color: white; }

button.btn-submit {
    width: 100%;
    padding: 16px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--primary-hover));
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
}
button.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
}

/* --- Tickets List --- */
.ticket-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.ticket {
    background: rgba(255, 255, 255, 0.02);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--card-border);
    transition: 0.2s ease;
}
.ticket:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: rgba(255, 255, 255, 0.15);
}

.ticket-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}
.ticket-title {
    font-size: 16px;
    font-weight: 600;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    gap: 8px;
}
.ticket-id {
    font-size: 12px;
    color: var(--primary);
    font-family: monospace;
    font-weight: 700;
    background: rgba(59, 130, 246, 0.1);
    padding: 4px 8px;
    border-radius: 6px;
}

.ticket-desc {
    font-size: 15px;
    color: #cbd5e1;
    margin-bottom: 16px;
    line-height: 1.5;
}

.ticket-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px dashed var(--card-border);
}
.ticket-meta div {
    display: flex;
    align-items: center;
    gap: 6px;
}
.ticket-meta i { font-size: 16px; color: #64748b; }

/* Status Badges & Controls */
.ticket-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    display: inline-block;
}
.badge.open { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
.badge.progress { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
.badge.done { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }

.statusSelect {
    padding: 6px 30px 6px 12px;
    font-size: 13px;
    width: auto;
    background-color: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    margin: 0;
}

.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
}
.empty-state i {
    font-size: 48px;
    opacity: 0.3;
    margin-bottom: 10px;
}

@media(max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
    .card { padding: 20px; }
}
</style>
</head>

<body>

<header>
    <h1>อต. FIKA</h1>
    <p>ระบบแจ้งปัญหาเมืองอัจฉริยะ (Smart City Complaint System)</p>
</header>

<div class="container">
    <div class="stats">
        <div class="stat">
            <i class="material-icons-round" style="color: #60a5fa;">receipt_long</i>
            <h2 id="total">0</h2>
            <p>เรื่องทั้งหมด</p>
        </div>
        <div class="stat">
            <i class="material-icons-round" style="color: #f87171;">report_problem</i>
            <h2 id="open">0</h2>
            <p>รับเรื่องแล้ว</p>
        </div>
        <div class="stat">
            <i class="material-icons-round" style="color: #fbbf24;">engineering</i>
            <h2 id="progress">0</h2>
            <p>กำลังดำเนินการ</p>
        </div>
        <div class="stat">
            <i class="material-icons-round" style="color: #34d399;">task_alt</i>
            <h2 id="done">0</h2>
            <p>เสร็จสิ้น</p>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <h2><i class="material-icons-round">campaign</i> แจ้งปัญหา</h2>
            <form id="form">
                <div class="form-group">
                    <label>ชื่อผู้แจ้ง</label>
                    <input id="reporter" placeholder="ชื่อ หรือ นามแฝง" required>
                </div>
                <div class="form-group">
                    <label>สถานที่เกิดเหตุ</label>
                    <input id="loc" placeholder="เช่น ถนนตลาดเหนือ, ซอย 5" required>
                </div>
                <div class="form-group">
                    <label>ประเภทปัญหา</label>
                    <select id="category">
                        <option value="ถนนชำรุด">ถนนชำรุด / หลุมบ่อ</option>
                        <option value="ไฟถนนดับ">ไฟถนนดับ</option>
                        <option value="ขยะ">ปัญหาขยะตกค้าง</option>
                        <option value="ท่อระบายน้ำ">ท่อระบายน้ำ / น้ำท่วมขัง</option>
                        <option value="น้ำประปา">น้ำประปา / ท่อแตก</option>
                        <option value="ต้นไม้กีดขวาง">ต้นไม้กีดขวาง</option>
                        <option value="สัตว์จรจัด">สัตว์จรจัด</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>รายละเอียดปัญหา</label>
                    <textarea id="problem" rows="4" placeholder="อธิบายปัญหาที่พบเห็น..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="material-icons-round">send</i> ส่งเรื่องร้องเรียน
                </button>
            </form>
        </div>

        <div class="card">
            <h2><i class="material-icons-round">history</i> รายการแจ้งปัญหา</h2>
            <div id="list" class="ticket-list"></div>
        </div>
    </div>
</div>

<script>
let tickets = JSON.parse(localStorage.getItem("cityTickets")) || [];
let nextId = tickets.length ? Math.max(...tickets.map(t => t.id)) + 1 : 1;
const list = document.getElementById("list");

const statusLabels = {
    open: "รับเรื่องแล้ว",
    progress: "กำลังดำเนินการ",
    done: "เสร็จสิ้น"
};

function updateStats() {
    document.getElementById("total").textContent = tickets.length;
    document.getElementById("open").textContent = tickets.filter(t => t.status === "open").length;
    document.getElementById("progress").textContent = tickets.filter(t => t.status === "progress").length;
    document.getElementById("done").textContent = tickets.filter(t => t.status === "done").length;
}

function render() {
    list.innerHTML = "";

    if(tickets.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <i class="material-icons-round">inbox</i>
                <p>ยังไม่มีรายการแจ้งปัญหาในขณะนี้</p>
            </div>
        `;
        updateStats();
        return;
    }

    tickets.forEach(t => {
        // จัดรูปแบบวันที่ (ถ้ามี) หรือแสดงค่าว่างถ้าเป็นข้อมูลเก่าที่ไม่มี Date
        let dateStr = "ไม่ระบุเวลา";
        if (t.date) {
            let d = new Date(t.date);
            dateStr = d.toLocaleDateString('th-TH') + ' ' + d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
        }

        list.innerHTML += `
            <div class="ticket">
                <div class="ticket-top">
                    <div class="ticket-title">${t.category}</div>
                    <span class="ticket-id">#FIKA-${String(t.id).padStart(4, '0')}</span>
                </div>
                <div class="ticket-desc">
                    ${t.problem}
                </div>
                <div class="ticket-meta">
                    <div><i class="material-icons-round">place</i> ${t.location}</div>
                    <div><i class="material-icons-round">person</i> ${t.reporter} &nbsp;|&nbsp; <i class="material-icons-round">schedule</i> ${dateStr}</div>
                </div>
                
                <div class="ticket-footer">
                    <span class="badge ${t.status}">${statusLabels[t.status]}</span>
                    
                    <select class="statusSelect" onchange="updateStatus(${t.id}, this.value)">
                        <option value="open" ${t.status === "open" ? "selected" : ""}>รับเรื่องแล้ว</option>
                        <option value="progress" ${t.status === "progress" ? "selected" : ""}>กำลังดำเนินการ</option>
                        <option value="done" ${t.status === "done" ? "selected" : ""}>เสร็จสิ้น</option>
                    </select>
                </div>
            </div>
        `;
    });

    updateStats();
}

function updateStatus(id, status) {
    let t = tickets.find(x => x.id === id);
    if(t) {
        t.status = status;
        localStorage.setItem("cityTickets", JSON.stringify(tickets));
        render();
    }
}

document.getElementById("form").onsubmit = e => {
    e.preventDefault();

    let ticket = {
        id: nextId++,
        reporter: document.getElementById("reporter").value,
        location: document.getElementById("loc").value,
        category: document.getElementById("category").value,
        problem: document.getElementById("problem").value,
        status: "open",
        date: Date.now()
    };

    tickets.unshift(ticket); // เอาเรื่องใหม่ไว้บนสุด
    localStorage.setItem("cityTickets", JSON.stringify(tickets));
    
    render();
    e.target.reset(); // ล้างฟอร์ม
};

// รันครั้งแรกเมื่อโหลดหน้า
render();
</script>

</body>
</html>
