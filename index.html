<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อต. FIKA - ระบบแจ้งปัญหาเมือง</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
:root {
    --primary: #0a2540;      
    --primary-container: #c5d5e8;
    --accent: #f26522;       
    --accent-container: #ffede0;
    --surface: #ffffff;
    --surface-variant: #e0e3e9;
    
    --glass-bg: rgba(255, 255, 255, 0.25);
    --glass-border: rgba(255, 255, 255, 0.18);
    --blur: blur(20px);
    
    --bg-body: linear-gradient(135deg, #f0f4ff 0%, #e0e8ff 50%, #f8fbff 100%);
    --text-main: #1e293b;
    --text-muted: #64748b;
    --shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
    --shadow-hover: 0 20px 40px rgba(31, 38, 135, 0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Prompt", sans-serif; }
body { 
    background: var(--bg-body); 
    color: var(--text-main); 
    min-height: 100vh; 
    padding-bottom: 50px; 
    overflow-x: hidden; 
}

header {
    background: linear-gradient(135deg, var(--primary), #184273, #2e5a8a);
    color: #ffffff; 
    padding: 40px 20px 80px;
    position: relative; 
    clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%); 
    margin-bottom: -40px;
    box-shadow: var(--shadow);
}
.header-top { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
    max-width: 1200px; 
    margin: 0 auto 20px; 
}
.logo-area { text-align: left; }
.logo-area h1 { 
    font-size: 36px; 
    font-weight: 700; 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 5px; 
    letter-spacing: -0.5px; 
}
.logo-area h1 i { 
    color: var(--accent); 
    font-size: 42px; 
    filter: drop-shadow(0 2px 4px rgba(242,101,34,0.4)); 
}
.logo-area p { 
    font-size: 16px; 
    font-weight: 300; 
    opacity: 0.95; 
    letter-spacing: 0.5px; 
}

.auth-btn {
    background: var(--glass-bg); 
    backdrop-filter: var(--blur);
    color: white; 
    border: 1px solid var(--glass-border);
    padding: 12px 24px; 
    border-radius: 16px; 
    font-size: 15px; 
    font-weight: 600;
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}
.auth-btn::before {
    content: ''; 
    position: absolute; 
    top: 0; 
    left: -100%; 
    width: 100%; 
    height: 100%; 
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); 
    transition: 0.6s; 
}
.auth-btn:hover::before { left: 100%; }
.auth-btn:hover { 
    background: rgba(242,101,34,0.9); 
    border-color: rgba(242,101,34,0.5); 
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
}
.auth-btn.logout { 
    background: rgba(239,68,68,0.8); 
    border-color: rgba(239,68,68,0.4); 
}
.auth-btn.logout:hover { 
    background: rgba(239,68,68,1); 
}

.container { 
    max-width: 1200px; 
    margin: auto; 
    padding: 0 20px; 
    position: relative; 
    z-index: 10; 
}

.stats { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
    gap: 24px; 
    margin-bottom: 40px; 
}
.stat { 
    background: var(--glass-bg); 
    backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: 20px; 
    padding: 28px; 
    display: flex; 
    align-items: center; 
    gap: 24px; 
    border-left: 5px solid rgba(242,101,34,0.6);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    animation: fadeInUp 0.6s ease forwards;
    opacity: 0; 
    transform: translateY(30px);
}
.stat:hover { 
    transform: translateY(-4px); 
    box-shadow: var(--shadow-hover); 
}
.stat:nth-child(1) { animation-delay: 0.1s; }
.stat:nth-child(2) { animation-delay: 0.2s; }
.stat:nth-child(3) { animation-delay: 0.3s; }
.stat:nth-child(4) { animation-delay: 0.4s; }
.stat-icon { 
    width: 60px; 
    height: 60px; 
    border-radius: 16px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 28px; 
    background: rgba(255,255,255,0.4); 
    color: var(--primary); 
    backdrop-filter: var(--blur);
    box-shadow: var(--shadow);
}
.stat-info h2 { 
    font-size: 32px; 
    font-weight: 700; 
    color: var(--text-main); 
    margin-bottom: 4px; 
}
.stat-info p { 
    font-size: 14px; 
    color: var(--text-muted); 
    font-weight: 500; 
    letter-spacing: 0.3px; 
}

@keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
}

.grid { 
    display: grid; 
    grid-template-columns: 380px 1fr; 
    gap: 40px; 
    align-items: start; 
}
.card { 
    background: var(--glass-bg); 
    backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    border-radius: 24px; 
    padding: 32px; 
    box-shadow: var(--shadow); 
    transition: all 0.3s ease;
    position: relative;
    z-index: 20;
}
.card:hover { 
    box-shadow: var(--shadow-hover); 
    transform: translateY(-2px); 
}
.card-header { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 24px; 
    padding-bottom: 20px; 
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.card-header h2 { 
    font-size: 20px; 
    font-weight: 700; 
    color: var(--primary); 
    display: flex; 
    align-items: center; 
    gap: 10px; 
}

.form-group { margin-bottom: 20px; }
label { 
    display: block; 
    margin-bottom: 8px; 
    font-size: 15px; 
    color: var(--text-main); 
    font-weight: 600; 
}
input, select, textarea { 
    width: 100%; 
    padding: 14px 18px; 
    border-radius: 12px; 
    border: 1px solid rgba(196, 196, 196, 0.3); 
    background: rgba(255,255,255,0.7); 
    font-size: 15px; 
    backdrop-filter: var(--blur);
    transition: all 0.3s ease;
    font-family: inherit;
}
input:focus, select:focus, textarea:focus { 
    outline: none; 
    border-color: var(--accent); 
    background: rgba(255,255,255,0.95); 
    box-shadow
