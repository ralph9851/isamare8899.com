<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>อต. FIKA - ระบบแจ้งปัญหาเมือง</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>

body{
font-family:Prompt;
background:#0f172a;
color:white;
margin:0;
}

header{
text-align:center;
padding:40px;
}

header h1{
font-size:34px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:320px 1fr;
gap:25px;
}

.card{
background:#1e293b;
border-radius:14px;
padding:20px;
}

.card h2{
margin-top:0;
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:12px;
background:#334155;
color:white;
}

button{
width:100%;
padding:12px;
background:#2563eb;
border:none;
border-radius:10px;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.ticket{
background:#1e293b;
border-radius:10px;
padding:15px;
margin-bottom:15px;
}

.ticket small{
color:#94a3b8;
}

.status{
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.open{background:#ef4444;}
.progress{background:#f59e0b;}
.done{background:#10b981;}

select.statusSelect{
width:auto;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

.stat{
background:#1e293b;
padding:15px;
border-radius:10px;
text-align:center;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header>
<h1><span class="material-icons-round">location_city</span> อต. FIKA</h1>
<p>ระบบแจ้งปัญหาเมืองอัจฉริยะ (Smart City Service)</p>
</header>

<div class="container">

<div class="stats">

<div class="stat">
<h3 id="total">0</h3>
<small>เรื่องทั้งหมด</small>
</div>

<div class="stat">
<h3 id="open">0</h3>
<small>รับเรื่องแล้ว</small>
</div>

<div class="stat">
<h3 id="progress">0</h3>
<small>กำลังดำเนินการ</small>
</div>

<div class="stat">
<h3 id="done">0</h3>
<small>เสร็จสิ้น</small>
</div>

</div>

<div class="grid">

<div class="card">

<h2>แจ้งปัญหา</h2>

<form id="form">

<label>ชื่อผู้แจ้ง</label>
<input id="reporter" required>

<label>สถานที่เกิดเหตุ</label>
<input id="location" placeholder="เช่น ถนนตลาดเหนือ">

<label>ประเภทปัญหา</label>

<select id="category">

<option value="road">ถนนชำรุด</option>
<option value="light">ไฟถนนดับ</option>
<option value="garbage">ขยะ</option>
<option value="drain">ท่อระบายน้ำ</option>
<option value="water">น้ำประปา</option>
<option value="tree">ต้นไม้กีดขวาง</option>
<option value="animal">สัตว์จรจัด</option>
<option value="other">อื่นๆ</option>

</select>

<label>รายละเอียด</label>
<textarea id="problem" rows="4"></textarea>

<button type="submit">ส่งแจ้งปัญหา</button>

</form>

</div>

<div class="card">

<h2>รายการแจ้งปัญหา</h2>

<div id="list"></div>

</div>

</div>

</div>

<script>

let tickets = JSON.parse(localStorage.getItem("city_tickets")) || [];

let nextId = tickets.length ? Math.max(...tickets.map(t=>t.id))+1 : 1;

const list = document.getElementById("list");

function updateStats(){

document.getElementById("total").textContent=tickets.length;

document.getElementById("open").textContent=
tickets.filter(t=>t.status=="open").length;

document.getElementById("progress").textContent=
tickets.filter(t=>t.status=="progress").length;

document.getElementById("done").textContent=
tickets.filter(t=>t.status=="done").length;

}

function render(){

list.innerHTML="";

tickets.forEach(t=>{

list.innerHTML+=`

<div class="ticket">

<strong>${t.category}</strong>

<p>${t.problem}</p>

<small>📍 ${t.location}</small><br>
<small>👤 ${t.reporter}</small><br>

<select class="statusSelect status ${t.status}"
onchange="updateStatus(${t.id},this.value)">

<option value="open" ${t.status=="open"?"selected":""}>รับเรื่องแล้ว</option>

<option value="progress" ${t.status=="progress"?"selected":""}>กำลังดำเนินการ</option>

<option value="done" ${t.status=="done"?"selected":""}>เสร็จสิ้น</option>

</select>

</div>

`;

});

updateStats();

}

function updateStatus(id,status){

let t=tickets.find(x=>x.id==id);

t.status=status;

localStorage.setItem("city_tickets",JSON.stringify(tickets));

render();

}

document.getElementById("form").onsubmit=e=>{

e.preventDefault();

let ticket={

id:nextId++,

reporter:document.getElementById("reporter").value,

location:document.getElementById("location").value,

category:document.getElementById("category").value,

problem:document.getElementById("problem").value,

status:"open",

date:Date.now()

};

tickets.unshift(ticket);

localStorage.setItem("city_tickets",JSON.stringify(tickets));

render();

e.target.reset();

};

render();

</script>

</body>
</html>
