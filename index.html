<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>RouteMap Service Desk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/icon?family=Material+Icons+Round');

:root {
  --bg-main: #f3f4f6;
  --bg-card: #ffffff;
  --text-dark: #111827;
  --text-muted: #6b7280;
  --border-color: #e5e7eb;
  
  --primary: #4f46e5;      /* Indigo */
  --primary-hover: #4338ca;
  --primary-light: #e0e7ff;
  
  --status-open: #ef4444;    /* Red */
  --status-open-bg: #fee2e2;
  --status-progress: #f59e0b; /* Amber */
  --status-progress-bg: #fef3c7;
  --status-done: #10b981;    /* Emerald */
  --status-done-bg: #d1fae5;

  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --radius-lg: 16px;
  --radius-md: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Prompt', sans-serif;
  background-color: var(--bg-main);
  color: var(--text-dark);
  line-height: 1.5;
  padding-bottom: 3rem;
}

/* --- Navbar --- */
.navbar {
  background-color: var(--bg-card);
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--primary);
}

.brand i { font-size: 1.8rem; }
.badge-test { background: var(--primary-light); color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }

/* --- Layout --- */
.container { max-width: 1280px; margin: 2rem auto; padding: 0 1.5rem; }

/* --- Stats --- */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 2rem;
}

.stat-card {
  background: var(--bg-card); padding: 1.5rem; border-radius: var(--radius-md);
  border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);
  display: flex; align-items: center; justify-content: space-between;
}

.stat-info h3 { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-info .num { font-size: 1.75rem; font-weight: 700; color: var(--text-dark); margin-top: 0.25rem; }
.stat-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

/* --- Main Grid --- */
.main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 2rem; align-items: start; }

/* --- Form --- */
.form-card {
  background: var(--bg-card); padding: 1.5rem; border-radius: var(--radius-lg);
  border: 1px solid var(--border-color); box-shadow: var(--shadow-md);
  position: sticky; top: 5.5rem;
}

.form-card h2 { font-size: 1.1rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; }

.form-group { margin-bottom: 1rem; }
label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); margin-bottom: 0.4rem; }

input, select, textarea {
  width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid #d1d5db;
  background-color: #f9fafb; font-family: inherit; font-size: 0.9rem; color: var(--text-dark); transition: all 0.2s;
}

input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 3px var(--primary-light);
}

button[type="submit"] {
  width: 100%; padding: 0.875rem; border-radius: 8px; border: none; background: var(--primary); color: white;
  font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: background 0.2s; margin-top: 1.5rem;
}
button[type="submit"]:hover { background: var(--primary-hover); }

/* --- Tickets List --- */
.list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.list-header h2 { font-size: 1.25rem; font-weight: 600; }

.ticket {
  background: var(--bg-card); border-radius: var(--radius-md); margin-bottom: 1rem;
  border: 1px solid var(--border-color); border-left: 5px solid var(--border-color);
  box-shadow: var(--shadow-sm); padding: 1.25rem; transition: transform 0.2s, box-shadow 0.2s;
}

.ticket:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

.ticket[data-status="open"] { border-left-color: var(--status-open); }
.ticket[data-status="progress"] { border-left-color: var(--status-progress); }
.ticket[data-status="done"] { border-left-color: var(--status-done); }

.ticket-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
.ticket-title { font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
.ticket-id { font-size: 0.75rem; color: var(--text-muted); background: var(--bg-main); padding: 0.2rem 0.5rem; border-radius: 4px; font-family: monospace; }

.vehicle-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: #e0f2fe; color: #0284c7; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.75rem; }

.ticket-desc { color: var(--text-dark); font-size: 0.9rem; margin-bottom: 1rem; background: #f9fafb; padding: 0.75rem; border-radius: 6px; border: 1px solid #f3f4f6; }

.ticket-bottom { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed var(--border-color); padding-top: 1rem; }
.ticket-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 1rem; }
.ticket-meta span { display: flex; align-items: center; gap: 0.25rem; }

/* Status Dropdown Pill */
.status-select {
  padding: 0.4rem 2rem 0.4rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; border: none; cursor: pointer;
  appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat; background-position: right 0.5rem center; background-size: 1em;
}

.status-open-style { background-color: var(--status-open-bg); color: #b91c1c; }
.status-progress-style { background-color: var(--status-progress-bg); color: #b45309; }
.status-done-style { background-color: var(--status-done-bg); color: #047857; }

/* --- Utils --- */
.empty-state { text-align: center; padding: 3rem; background: var(--bg-card); border-radius: var(--radius-md); border: 1px dashed var(--border-color); color: var(--text-muted); }
.empty-state i { font-size: 3rem; color: #cbd5e1; margin-bottom: 1rem; }
#toast { position: fixed; bottom: 20px; center: 0; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text-dark); color: white; padding: 0.75rem 1.5rem; border-radius: 30px; display: flex; align-items: center; gap: 0.5rem; opacity: 0; transition: all 0.3s ease; z-index: 1000; box-shadow: var(--shadow-md); }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.spin { animation: spin 1s linear infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }

@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
  .form-card { position: static; margin-bottom: 2rem; }
  .ticket-bottom { flex-direction: column; align-items: flex-start; gap: 1rem; }
  .status-select { width: 100%; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="brand">
    <i class="material-icons-round">route</i> RouteMap Desk
    <span class="badge-test">Local Test</span>
  </div>
  <div style="display:flex; align-items:center; gap:0.5rem; color:var(--text-muted); font-size:0.9rem;">
    <i class="material-icons-round">account_circle</i> User_Admin
  </div>
</nav>

<div class="container">
  
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-info">
        <h3>ทั้งหมด</h3>
        <div class="num" id="totalTickets">0</div>
      </div>
      <div class="stat-icon" style="background: #f1f5f9; color: #64748b;"><i class="material-icons-round">tag</i></div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <h3>รอแก้ไข</h3>
        <div class="num" id="openTickets" style="color: var(--status-open);">0</div>
      </div>
      <div class="stat-icon" style="background: var(--status-open-bg); color: var(--status-open);"><i class="material-icons-round">error_outline</i></div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <h3>กำลังทำ</h3>
        <div class="num" id="progressTickets" style="color: var(--status-progress);">0</div>
      </div>
      <div class="stat-icon" style="background: var(--status-progress-bg); color: var(--status-progress);"><i class="material-icons-round">autorenew</i></div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <h3>เสร็จสิ้น</h3>
        <div class="num" id="doneTickets" style="color: var(--status-done);">0</div>
      </div>
      <div class="stat-icon" style="background: var(--status-done-bg); color: var(--status-done);"><i class="material-icons-round">check_circle_outline</i></div>
    </div>
  </div>

  <div class="main-grid">
    
    <div class="form-card">
      <h2><i class="material-icons-round" style="color: var(--primary);">add_box</i> สร้างรายการใหม่</h2>
      <form id="ticketForm">
        <div class="form-group">
          <label>ผู้แจ้ง / เขตพื้นที่</label>
          <input id="reporter" placeholder="ระบุชื่อผู้แจ้ง" required>
        </div>
        <div class="form-group">
          <label>ทะเบียนรถ</label>
          <input id="vehicle" placeholder="เช่น 65-7233" required>
        </div>
        <div class="form-group">
          <label>ประเภทปัญหา</label>
          <select id="category" required>
            <option value="" disabled selected>-- เลือกประเภท --</option>
            <option value="gps">สัญญาณ GPS หาย / ไม่ขยับ</option>
            <option value="data">ข้อมูลรถ / พขร. ไม่ถูกต้อง</option>
            <option value="system">ระบบค้าง / เข้าใช้งานไม่ได้</option>
            <option value="other">ปัญหาอื่นๆ</option>
          </select>
        </div>
        <div class="form-group">
          <label>รายละเอียด</label>
          <textarea id="problem" rows="3" placeholder="ระบุอาการเพิ่มเติม..." required></textarea>
        </div>
        <button type="submit" id="submitBtn">บันทึกข้อมูล</button>
      </form>
    </div>

    <div class="list-section">
      <div class="list-header">
        <h2>รายการล่าสุด</h2>
      </div>
      <div id="ticketList"></div>
    </div>

  </div>
</div>

<div id="toast"><i class="material-icons-round" style="color:#4ade80;">check_circle</i> <span>สำเร็จ!</span></div>

<script>
// --- ส่วน Logic (เหมือนเดิม แต่ปรับ Class ให้ตรงกับ CSS ใหม่) ---
const form = document.getElementById("ticketForm");
const submitBtn = document.getElementById("submitBtn");
const ticketList = document.getElementById("ticketList");
const toast = document.getElementById("toast");

const STORAGE_KEY = "routemap_modern_test";
let tickets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let nextId = tickets.length > 0 ? Math.max(...tickets.map(t => t.id)) + 1 : 1;

const categoryMap = { gps: 'สัญญาณ GPS', data: 'ข้อมูลรถ/พขร.', system: 'ระบบมีปัญหา', other: 'อื่นๆ' };

function getStatusStyle(status) {
  if(status === 'open') return 'status-open-style';
  if(status === 'progress') return 'status-progress-style';
  return 'status-done-style';
}

function updateStatsUI() {
  document.getElementById("totalTickets").textContent = tickets.length;
  document.getElementById("openTickets").textContent = tickets.filter(t => t.status === 'open').length;
  document.getElementById("progressTickets").textContent = tickets.filter(t => t.status === 'progress').length;
  document.getElementById("doneTickets").textContent = tickets.filter(t => t.status === 'done').length;
}

function showToast(msg) {
  toast.querySelector('span').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function renderTickets() {
  if (tickets.length === 0) {
    ticketList.innerHTML = `<div class="empty-state"><i class="material-icons-round">inbox</i><p>ยังไม่มีรายการแจ้งปัญหา</p></div>`;
    return;
  }

  ticketList.innerHTML = tickets.map(ticket => `
    <div class="ticket" data-status="${ticket.status}">
      <div class="ticket-top">
        <div class="ticket-title">
          ${categoryMap[ticket.category] || ticket.category}
        </div>
        <div class="ticket-id">#TKT-${String(ticket.id).padStart(4, '0')}</div>
      </div>
      
      <div class="vehicle-badge">
        <i class="material-icons-round" style="font-size: 1rem;">directions_car</i> ${ticket.vehicle}
      </div>
      
      <div class="ticket-desc">${ticket.problem}</div>
      
      <div class="ticket-bottom">
        <div class="ticket-meta">
          <span><i class="material-icons-round" style="font-size: 1rem;">person</i> ${ticket.reporter}</span>
          <span><i class="material-icons-round" style="font-size: 1rem;">schedule</i> ${new Date(ticket.createdAt).toLocaleDateString('th-TH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'})}</span>
        </div>
        
        <select class="status-select ${getStatusStyle(ticket.status)}" onchange="updateStatus(${ticket.id}, this.value, this)">
          <option value="open" ${ticket.status === 'open' ? 'selected' : ''}>รอแก้ไข</option>
          <option value="progress" ${ticket.status === 'progress' ? 'selected' : ''}>กำลังทำ</option>
          <option value="done" ${ticket.status === 'done' ? 'selected' : ''}>เสร็จสิ้น</option>
        </select>
      </div>
    </div>
  `).join('');
}

function updateStatus(id, status, selectEl) {
  const ticket = tickets.find(t => t.id === id);
  if (ticket) {
    ticket.status = status;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
    selectEl.closest('.ticket').setAttribute('data-status', status);
    selectEl.className = `status-select ${getStatusStyle(status)}`;
    updateStatsUI();
  }
}

form.onsubmit = (e) => {
  e.preventDefault();
  const originalText = submitBtn.innerHTML;
  submitBtn.innerHTML = `<i class="material-icons-round spin">sync</i> กำลังบันทึก...`;
  submitBtn.disabled = true;
  
  setTimeout(() => {
    tickets.unshift({
      id: nextId++,
      reporter: document.getElementById("reporter").value.trim(),
      vehicle: document.getElementById("vehicle").value.trim(),
      category: document.getElementById("category").value,
      problem: document.getElementById("problem").value.trim(),
      status: 'open',
      createdAt: Date.now()
    });
    
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
    renderTickets();
    updateStatsUI();
    showToast("บันทึกข้อมูลสำเร็จ");
    
    submitBtn.innerHTML = originalText;
    submitBtn.disabled = false;
    form.reset();
  }, 400);
};

// Initial load
renderTickets();
updateStatsUI();
</script>

</body>
</html>
