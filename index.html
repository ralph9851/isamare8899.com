<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>อต. FIKA - ระบบแจ้งปัญหาเมือง</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Prompt",sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e293b,#334155);

color:#f1f5f9;

min-height:100vh;

}

header{

text-align:center;
padding:40px;

}

header h1{

font-size:34px;
font-weight:700;

background:linear-gradient(90deg,#60a5fa,#22c55e);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

header p{

color:#cbd5f5;
margin-top:5px;

}

.container{

max-width:1200px;
margin:auto;
padding:20px;

}

.stats{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-bottom:25px;

}

.stat{

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:16px;
padding:20px;
text-align:center;

}

.stat h2{

font-size:28px;
margin-bottom:5px;

}

.grid{

display:grid;
grid-template-columns:360px 1fr;
gap:25px;

}

.card{

background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-radius:20px;
padding:20px;

}

.card h2{

margin-bottom:15px;

display:flex;
align-items:center;
gap:8px;

}

input,select,textarea{

width:100%;
padding:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:rgba(0,0,0,0.2);
color:white;
margin-bottom:12px;

}

input:focus,
select:focus,
textarea:focus{

outline:none;
border-color:#3b82f6;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:12px;

background:linear-gradient(135deg,#3b82f6,#2563eb);

color:white;
font-weight:600;
cursor:pointer;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

}

.ticket{

background:rgba(255,255,255,0.05);
border-radius:16px;
padding:15px;
margin-bottom:15px;
border:1px solid rgba(255,255,255,0.08);

}

.ticket-top{

display:flex;
justify-content:space-between;
margin-bottom:6px;

}

.ticket-id{

font-size:12px;
color:#94a3b8;

}

.ticket-desc{

margin:10px 0;
color:#e2e8f0;

}

.ticket-meta{

font-size:13px;
color:#94a3b8;

}

.status{

padding:5px 12px;
border-radius:20px;
font-size:12px;

}

.open{

background:#ef4444;

}

.progress{

background:#f59e0b;

}

.done{

background:#22c55e;

}

.statusSelect{

margin-top:10px;
width:auto;

}

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<h1>อต. FIKA</h1>

<p>ระบบแจ้งปัญหาเมืองอัจฉริยะ (Smart City Complaint System)</p>

</header>

<div class="container">

<div class="stats">

<div class="stat">
<h2 id="total">0</h2>
<p>เรื่องทั้งหมด</p>
</div>

<div class="stat">
<h2 id="open">0</h2>
<p>รับเรื่องแล้ว</p>
</div>

<div class="stat">
<h2 id="progress">0</h2>
<p>กำลังดำเนินการ</p>
</div>

<div class="stat">
<h2 id="done">0</h2>
<p>เสร็จสิ้น</p>
</div>

</div>

<div class="grid">

<div class="card">

<h2><span class="material-icons-round">campaign</span> แจ้งปัญหา</h2>

<form id="form">

<label>ชื่อผู้แจ้ง</label>

<input id="reporter" required>

<label>สถานที่เกิดเหตุ</label>

<input id="location" placeholder="เช่น ถนนตลาดเหนือ">

<label>ประเภทปัญหา</label>

<select id="category">

<option value="ถนนชำรุด">ถนนชำรุด</option>

<option value="ไฟถนนดับ">ไฟถนนดับ</option>

<option value="ขยะ">ขยะ</option>

<option value="ท่อระบายน้ำ">ท่อระบายน้ำ</option>

<option value="น้ำประปา">น้ำประปา</option>

<option value="ต้นไม้กีดขวาง">ต้นไม้กีดขวาง</option>

<option value="สัตว์จรจัด">สัตว์จรจัด</option>

<option value="อื่นๆ">อื่นๆ</option>

</select>

<label>รายละเอียดปัญหา</label>

<textarea id="problem" rows="4"></textarea>

<button type="submit">

<span class="material-icons-round">send</span>

ส่งแจ้งปัญหา

</button>

</form>

</div>

<div class="card">

<h2><span class="material-icons-round">history</span> รายการแจ้งปัญหา</h2>

<div id="list"></div>

</div>

</div>

</div>

<script>

let tickets=JSON.parse(localStorage.getItem("cityTickets"))||[];

let nextId=tickets.length?Math.max(...tickets.map(t=>t.id))+1:1;

const list=document.getElementById("list");

function updateStats(){

document.getElementById("total").textContent=tickets.length;

document.getElementById("open").textContent=
tickets.filter(t=>t.status=="open").length;

document.getElementById("progress").textContent=
tickets.filter(t=>t.status=="progress").length;

document.getElementById("done").textContent=
tickets.filter(t=>t.status=="done").length;

}

function render(){

list.innerHTML="";

tickets.forEach(t=>{

list.innerHTML+=`

<div class="ticket">

<div class="ticket-top">

<strong>${t.category}</strong>

<span class="ticket-id">#FIKA-${String(t.id).padStart(4,'0')}</span>

</div>

<div class="ticket-desc">

${t.problem}

</div>

<div class="ticket-meta">

📍 ${t.location}<br>

👤 ${t.reporter}

</div>

<select class="statusSelect status ${t.status}"
onchange="updateStatus(${t.id},this.value)">

<option value="open" ${t.status=="open"?"selected":""}>
รับเรื่องแล้ว
</option>

<option value="progress" ${t.status=="progress"?"selected":""}>
กำลังดำเนินการ
</option>

<option value="done" ${t.status=="done"?"selected":""}>
เสร็จสิ้น
</option>

</select>

</div>

`;

});

updateStats();

}

function updateStatus(id,status){

let t=tickets.find(x=>x.id==id);

t.status=status;

localStorage.setItem("cityTickets",JSON.stringify(tickets));

render();

}

document.getElementById("form").onsubmit=e=>{

e.preventDefault();

let ticket={

id:nextId++,

reporter:reporter.value,

location:location.value,

category:category.value,

problem:problem.value,

status:"open",

date:Date.now()

};

tickets.unshift(ticket);

localStorage.setItem("cityTickets",JSON.stringify(tickets));

render();

e.target.reset();

};

render();

</script>

</body>
</html>
